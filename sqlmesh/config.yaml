project: ai_onboarding_categorization

gateways:
  local:
    connection:
      type: spark
    state_connection:
      type: duckdb
      database: ":memory:"
  databricks_dev:
    connection:
      type: databricks
      server_hostname: "{{ env_var('DATABRICKS_HOST', 'dummy') }}"
      http_path: "{{ env_var('WAREHOUSE_HTTP_PATH', 'dummy') }}"
      access_token: "{{ env_var('DATABRICKS_TOKEN', 'dummy') }}"
      catalog: "ciq-bp_dummy-dev"
    state_connection:
      type: duckdb
      database: "databricks_state.db"

default_gateway: local

variables:
  tenant_catalog: "ciq-bp_dummy-dev"
  bronze_schema: "raw"
  staging_schema: "staging"
  silver_schema: "silver"
  suggestions_schema: "suggestions"

model_defaults:
  dialect: databricks
